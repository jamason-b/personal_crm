  <!-- Theme Color for iOS Status Bar & Safari Bottom Bar -->
  <meta name="theme-color" content="#FAFAFA" id="theme-color-meta">
  
  <!-- iOS Native App Capabilities -->

  <!-- Load Firebase Compat SDKs -->

  <style>
    /* Force the physical HTML/Body to change color to match dark mode */
    html, body {
      background-color: #FAFAFA;
      transition: background-color 0.2s ease-in-out;
      /* Prevent the white background from showing on overscroll bounce */
      overscroll-behavior-y: none;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    /* Mobile safe area padding for the bottom swipe bar */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .safe-pb { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); } /* Adjusted for bottom nav */
    
    /* Floating Action Button (FAB) Safe Placement */
    .fab-safe {
      bottom: calc(5.5rem + env(safe-area-inset-bottom));
      right: 1.5rem;
    }
    @media (min-width: 640px) {
      .fab-safe {
        bottom: 2.5rem;
        right: 2.5rem;
      }
    }

    /* Hide scrollbar for clean internal scrolling areas */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Toast Animation */
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translate(-50%, 20px) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }
    .toast-enter { animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyB9s5odA5RIBPXmBumdSl59D89DBv9cZIQ",
      authDomain: "personal-budget-app-aeb06.firebaseapp.com",
      databaseURL: "https://personal-budget-app-aeb06-default-rtdb.firebaseio.com",
      projectId: "personal-budget-app-aeb06",
      storageBucket: "personal-budget-app-aeb06.firebasestorage.app",
      messagingSenderId: "116796553317",
      appId: "1:116796553317:web:71f4b1d1278bd185226e8c"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    // Enable offline persistence so data saves locally instantly, 
    // even if the app is closed before the network sync finishes.
    db.enablePersistence().catch(function(err) {
      console.warn("Firebase persistence error:", err.code);
    });

    const SHARED_DOC_ID = 'shared_workspace';

    // ==========================================
    // 2. ICONS
    // ==========================================
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const UserPlus = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const CalendarDays = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
    const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
    const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
    const MessageSquarePlus = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></Icon>;
    const TagIcon = (p) => <Icon {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const HistoryIcon = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ArrowUpDown = (p) => <Icon {...p}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></Icon>;
    const Pencil = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const Gift = (p) => <Icon {...p}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></Icon>;
    const Cloud = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const RefreshCcw = (p) => <Icon {...p}><path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/></Icon>;
    const BarChart3 = (p) => <Icon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></Icon>;
    const UsersIcon = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
    const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const TargetIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
    const PartyPopper = (p) => <Icon {...p}><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.39-1.87.15-2.15 1.07v0a1.96 1.96 0 0 1-2.56 1.14l-.83-.34"/><path d="m3 15 10.5-10.5a2.83 2.83 0 0 1 4 4L7 19l-4-4z"/></Icon>;
    const ActivityIcon = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;

    const DEFAULT_TAGS = ['Family', 'OG Friend', 'Mission Friend', 'School Friend'];
    const DEFAULT_QUICK_ACTIVITIES = ['📱 Texted', '📞 Called', '☕️ Coffee', '🍽️ Meal', '👋 Hung out'];

    // ==========================================
    // 3. GLOBAL HELPERS
    // ==========================================
    const getLatestInteraction = (contact) => {
      if (!contact.interactions || contact.interactions.length === 0) return null;
      return [...contact.interactions].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    };

    const getAttentionRatio = (contact) => {
      // If snoozed, they are perfectly healthy (ratio 0)
      if (contact.snoozeUntil && new Date(contact.snoozeUntil) > new Date()) return 0;
      
      const latest = getLatestInteraction(contact);
      if (!latest) return Infinity; // Never contacted pushes to absolute top
      const diffDays = Math.round(Math.abs(new Date() - new Date(latest.date)) / (1000 * 60 * 60 * 24));
      return diffDays / (contact.targetFrequency || 30);
    };

    const getRelativeTime = (dateString) => {
      if (!dateString) return 'Never';
      const date = new Date(dateString);
      const now = new Date();
      date.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
      const diffDays = Math.round(Math.abs(now - date) / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)} wks ago`;
      if (diffDays < 365) return `${Math.floor(diffDays / 30)} mos ago`;
      return `${Math.floor(diffDays / 365)} yrs ago`;
    };

    const getDaysUntilBirthday = (birthdayStr) => {
      if (!birthdayStr) return Infinity;
      const today = new Date();
      today.setHours(0,0,0,0);
      const [year, month, day] = birthdayStr.split('-');
      const bdayThisYear = new Date(today.getFullYear(), month - 1, day);
      if (bdayThisYear < today && (today - bdayThisYear) > 1000 * 60 * 60 * 24) {
         bdayThisYear.setFullYear(today.getFullYear() + 1);
      }
      return Math.round((bdayThisYear - today) / (1000 * 60 * 60 * 24));
    };

    const isBirthdayUpcoming = (birthdayStr) => {
      const days = getDaysUntilBirthday(birthdayStr);
      return days >= 0 && days <= 7;
    };

    const getAvatarColorClass = (fullName, isDarkMode) => {
      const colors = isDarkMode 
        ? ['bg-green-500/20 text-green-300', 'bg-teal-500/20 text-teal-300', 'bg-cyan-500/20 text-cyan-300', 'bg-blue-500/20 text-blue-300', 'bg-indigo-500/20 text-indigo-300', 'bg-purple-500/20 text-purple-300']
        : ['bg-green-100 text-green-700', 'bg-teal-100 text-teal-700', 'bg-cyan-100 text-cyan-700', 'bg-blue-100 text-blue-700', 'bg-indigo-100 text-indigo-700', 'bg-purple-100 text-purple-700'];
      let hash = 0;
      for (let i = 0; i < fullName.length; i++) hash = fullName.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    };

    // ==========================================
    // 4. SWIPEABLE CONTACT CARD COMPONENT
    // ==========================================
    const ContactCard = ({ contact, isDarkMode, t, openLogModal, openEditContactModal, setViewingHistoryFor, setContactToDelete, handleSnoozeContact }) => {
      const [swipeX, setSwipeX] = useState(0);
      const touchStartX = useRef(null);
      const touchStartY = useRef(null);
      const initialSwipeX = useRef(0); // Tracks where the card was when the touch started
      const isSwiping = useRef(false);
      const isHorizontal = useRef(false);
      const hasDragged = useRef(false); // Distinguish between a tap and a scroll/swipe
      
      const SWIPE_LEFT_THRESHOLD = -120; // Edit, Delete (Right side)
      const SWIPE_RIGHT_THRESHOLD = 80;  // Snooze (Left side)

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
        initialSwipeX.current = swipeX; // Capture the starting position
        isSwiping.current = true;
        isHorizontal.current = false;
        hasDragged.current = false;
      };

      const handleTouchMove = (e) => {
        if (!isSwiping.current) return;
        const diffX = e.touches[0].clientX - touchStartX.current;
        const diffY = e.touches[0].clientY - touchStartY.current;

        // If the user's finger moves more than 5px, it's a drag, not a tap
        if (Math.abs(diffX) > 5 || Math.abs(diffY) > 5) {
          hasDragged.current = true;
        }

        // Determine orientation
        if (!isHorizontal.current) {
          if (Math.abs(diffX) > Math.abs(diffY)) {
            isHorizontal.current = true;
          } else if (Math.abs(diffY) > Math.abs(diffX)) {
            isSwiping.current = false; // vertical scroll, abort swipe
            return;
          }
        }

        if (isHorizontal.current) {
          // Calculate the new absolute position based on where it started
          const newSwipeX = initialSwipeX.current + diffX;
          
          // Apply rubber-banding resistance if pulled past the thresholds
          if (newSwipeX < SWIPE_LEFT_THRESHOLD) {
             setSwipeX(SWIPE_LEFT_THRESHOLD + (newSwipeX - SWIPE_LEFT_THRESHOLD) * 0.2); 
          } else if (newSwipeX > SWIPE_RIGHT_THRESHOLD) {
             setSwipeX(SWIPE_RIGHT_THRESHOLD + (newSwipeX - SWIPE_RIGHT_THRESHOLD) * 0.2); 
          } else {
             setSwipeX(newSwipeX);
          }
        }
      };

      const handleTouchEnd = () => {
        isSwiping.current = false;
        if (!isHorizontal.current) return;

        const diffX = swipeX - initialSwipeX.current;

        // Smart snapping logic
        if (initialSwipeX.current === SWIPE_LEFT_THRESHOLD && diffX > 20) {
          // If it was open on the left, and they swiped right a bit -> snap closed
          setSwipeX(0);
        } else if (initialSwipeX.current === SWIPE_RIGHT_THRESHOLD && diffX < -20) {
          // If it was open on the right, and they swiped left a bit -> snap closed
          setSwipeX(0);
        } else if (swipeX < SWIPE_LEFT_THRESHOLD / 2) {
          // Swiped far enough left from center to open
          setSwipeX(SWIPE_LEFT_THRESHOLD);
        } else if (swipeX > SWIPE_RIGHT_THRESHOLD / 2) {
          // Swiped far enough right from center to open
          setSwipeX(SWIPE_RIGHT_THRESHOLD);
        } else {
          // Default snap to center
          setSwipeX(0);
        }
      };

      const resetSwipe = () => { 
        setSwipeX(0); 
      };

      // Extract Data Logic
      const ratio = getAttentionRatio(contact);
      const latestInteraction = getLatestInteraction(contact);
      const fullName = `${contact.firstName} ${contact.lastName}`;
      const isSnoozed = contact.snoozeUntil && new Date(contact.snoozeUntil) > new Date();

      // Dynamic Colors based on Urgency Ratio
      let urgencyColorClass = t('bg-emerald-100 text-emerald-700', 'bg-emerald-500/10 text-emerald-400'); // Default Green
      let nameColorClass = t('text-zinc-900', 'text-zinc-100');
      let avatarColorClass = t('bg-emerald-100 text-emerald-700', 'bg-emerald-500/20 text-emerald-300');
      let statusText = getRelativeTime(latestInteraction?.date);

      if (isSnoozed) { // Snoozed state overrides colors
        urgencyColorClass = t('bg-indigo-100 text-indigo-700', 'bg-indigo-500/10 text-indigo-400');
        nameColorClass = t('text-indigo-700', 'text-indigo-300');
        avatarColorClass = t('bg-indigo-100 text-indigo-700 ring-2 ring-indigo-500/20', 'bg-indigo-500/20 text-indigo-300 ring-2 ring-indigo-500/50');
        statusText = 'Snoozed';
      } else if (ratio > 1) { // Overdue (Red)
        urgencyColorClass = t('bg-rose-100 text-rose-700', 'bg-rose-500/10 text-rose-400');
        nameColorClass = t('text-rose-600', 'text-rose-400');
        avatarColorClass = t('bg-rose-100 text-rose-700 ring-2 ring-rose-500/20', 'bg-rose-500/20 text-rose-300 ring-2 ring-rose-500/50');
      } else if (ratio > 0.75) { // Warning (Yellow)
        urgencyColorClass = t('bg-amber-100 text-amber-700', 'bg-amber-500/10 text-amber-400');
        nameColorClass = t('text-amber-600', 'text-amber-400');
        avatarColorClass = t('bg-amber-100 text-amber-700 ring-2 ring-amber-500/20', 'bg-amber-500/20 text-amber-300 ring-2 ring-amber-500/50');
      } else if (!latestInteraction) {
        // Never interacted handles infinite ratio, handled above, but just in case
        avatarColorClass = t('bg-rose-100 text-rose-700', 'bg-rose-500/20 text-rose-300');
      } else {
        // Fallback hash colors for healthy contacts
        avatarColorClass = getAvatarColorClass(fullName, isDarkMode);
      }

      return (
        <div 
          className={`group relative overflow-hidden rounded-2xl border shadow-sm transition-all duration-200 ${t('bg-zinc-100 border-zinc-200', 'bg-zinc-800/50 border-zinc-700')}`}
        >

          {/* Action Layer LEFT (Snooze) - Mobile Only */}
          <div className="absolute inset-y-0 left-0 w-[80px] flex items-center justify-start pl-3 gap-2 z-0 sm:hidden">
            <button onClick={() => { resetSwipe(); handleSnoozeContact(contact); }} className={`flex flex-col items-center justify-center w-12 h-12 rounded-xl transition-all shadow-sm ${t('text-indigo-600 bg-indigo-50 hover:bg-indigo-100 hover:scale-105', 'text-indigo-400 bg-indigo-500/20 hover:bg-indigo-500/30 hover:scale-105')}`} title={isSnoozed ? "Un-snooze" : "Snooze 7 Days"}>
              <Clock size={18} />
            </button>
          </div>

          {/* Action Layer RIGHT (Edit, Delete) - Mobile Only */}
          <div className="absolute inset-y-0 right-0 w-[120px] flex items-center justify-end px-2 gap-2 z-0 sm:hidden">
            <button onClick={() => { resetSwipe(); openEditContactModal(contact); }} className={`flex flex-col items-center justify-center w-12 h-12 rounded-xl transition-all shadow-sm ${t('text-zinc-600 bg-white hover:text-blue-600 hover:scale-105', 'text-zinc-300 bg-zinc-800 hover:text-blue-400 hover:scale-105')}`} title="Edit">
              <Pencil size={18} />
            </button>
            <button onClick={() => { resetSwipe(); setContactToDelete(contact); }} className={`flex flex-col items-center justify-center w-12 h-12 rounded-xl transition-all shadow-sm ${t('text-zinc-600 bg-white hover:text-rose-600 hover:scale-105', 'text-zinc-300 bg-zinc-800 hover:text-rose-400 hover:scale-105')}`} title="Delete">
              <Trash2 size={18} />
            </button>
          </div>

          {/* Foreground Sliding Card */}
          <div
            className={`relative flex items-stretch justify-between w-full h-full transition-transform duration-300 ease-out z-10 ${t('bg-white', 'bg-zinc-900')}`}
            style={{ transform: `translateX(${swipeX}px)`, touchAction: 'pan-y' }}
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
            {/* Visual indicator that it's swipeable (only on mobile) */}
            <div className={`absolute left-0 inset-y-0 w-1 sm:hidden ${ratio > 1 && !isSnoozed ? (isDarkMode ? 'bg-rose-500/50' : 'bg-rose-400') : ratio > 0.75 && !isSnoozed ? (isDarkMode ? 'bg-amber-500/50' : 'bg-amber-400') : isSnoozed ? (isDarkMode ? 'bg-indigo-500/50' : 'bg-indigo-400') : 'bg-transparent'}`}></div>

            {/* Left Side: Avatar & Details (Now Tap-to-View-History) */}
            <div 
              onClick={() => {
                if (hasDragged.current) {
                  hasDragged.current = false;
                  return;
                }
                if (swipeX !== 0) {
                  resetSwipe();
                  return;
                }
                setViewingHistoryFor(contact);
              }}
              className={`p-4 sm:p-5 flex items-start gap-3 sm:gap-4 flex-1 min-w-0 pl-5 cursor-pointer transition-colors ${t('sm:hover:bg-zinc-50 active:bg-zinc-100', 'sm:hover:bg-zinc-800/40 active:bg-zinc-800/60')}`}
              title="View History"
            >
              <div className={`h-12 w-12 rounded-full flex items-center justify-center font-bold text-[14px] shrink-0 shadow-sm ${avatarColorClass}`}>
                {contact.firstName.charAt(0)}{contact.lastName ? contact.lastName.charAt(0) : ''}
              </div>
              
              <div className="min-w-0 pt-0.5 flex-1">
                <h3 className={`text-base font-semibold truncate transition-colors flex items-center gap-1.5 ${nameColorClass}`}>
                  {fullName}
                  {contact.isPinned && <Star size={12} className={`shrink-0 ${isSnoozed ? 'text-indigo-400 fill-indigo-400' : 'text-amber-400 fill-amber-400'}`} />}
                </h3>
                <div className="flex flex-wrap items-center gap-1.5 sm:gap-2 mt-1.5">
                  <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-semibold whitespace-nowrap ${urgencyColorClass}`}>
                    {statusText}
                  </span>
                  {contact.tag && (
                    <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-medium border whitespace-nowrap ${t('bg-zinc-50 border-zinc-200 text-zinc-500', 'bg-zinc-800/50 border-zinc-700 text-zinc-400')}`}>
                      <TagIcon size={10} className="mr-1 hidden sm:inline-block" />{contact.tag}
                    </span>
                  )}
                  {isBirthdayUpcoming(contact.birthday) && (
                    <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-medium border whitespace-nowrap ${t('bg-fuchsia-50 border-fuchsia-200 text-fuchsia-600', 'bg-fuchsia-500/10 border-fuchsia-500/20 text-fuchsia-400')}`} title="Birthday within 7 days!">
                      <Gift size={10} className="mr-1 hidden sm:inline-block" /> B-Day
                    </span>
                  )}
                </div>
                {latestInteraction?.note && (
                  <p className={`mt-2 text-sm italic truncate sm:whitespace-normal ${t('text-zinc-500', 'text-zinc-400')}`}>
                    "{latestInteraction.note}"
                  </p>
                )}
              </div>

              {/* Desktop Actions (Hidden on Mobile) */}
              <div className="hidden sm:flex items-end gap-1 self-end pb-1 pr-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                <button onClick={(e) => { e.stopPropagation(); openLogModal(contact); }} className={`p-1.5 rounded-lg transition-colors ${t('text-emerald-600 hover:bg-emerald-50 hover:text-emerald-700', 'text-emerald-500 hover:bg-emerald-500/20 hover:text-emerald-400')}`} title="Log Interaction">
                  <MessageSquarePlus size={16} strokeWidth={2.5} />
                </button>
                <div className={`w-px h-4 mx-1 self-center ${t('bg-zinc-200', 'bg-zinc-700')}`}></div>
                <button onClick={(e) => { e.stopPropagation(); handleSnoozeContact(contact); }} className={`p-1.5 rounded-lg transition-colors ${t('text-indigo-400 hover:bg-indigo-50 hover:text-indigo-600', 'text-indigo-500 hover:bg-indigo-500/20 hover:text-indigo-400')}`} title={isSnoozed ? "Un-snooze" : "Snooze 7 Days"}>
                  <Clock size={16} strokeWidth={2.5} />
                </button>
                <button onClick={(e) => { e.stopPropagation(); openEditContactModal(contact); }} className={`p-1.5 rounded-lg transition-colors ${t('text-zinc-400 hover:bg-zinc-100 hover:text-blue-600', 'text-zinc-500 hover:bg-zinc-800 hover:text-blue-400')}`} title="Edit">
                  <Pencil size={16} strokeWidth={2.5} />
                </button>
                <button onClick={(e) => { e.stopPropagation(); setContactToDelete(contact); }} className={`p-1.5 rounded-lg transition-colors ${t('text-zinc-400 hover:bg-zinc-100 hover:text-rose-600', 'text-zinc-500 hover:bg-zinc-800 hover:text-rose-400')}`} title="Delete">
                  <Trash2 size={16} strokeWidth={2.5} />
                </button>
              </div>
            </div>

            {/* Right Side: Massive Log Button (Mobile Only) */}
            <button 
              onClick={(e) => { e.stopPropagation(); openLogModal(contact); }} 
              className={`sm:hidden shrink-0 w-24 flex flex-col items-center justify-center gap-2 border-l transition-colors active:opacity-70 ${t('border-zinc-100 bg-zinc-50 hover:bg-zinc-100', 'border-zinc-800 bg-zinc-800/20 hover:bg-zinc-800/60')}`}
            >
              <div className={`p-2 rounded-full transition-colors ${t('bg-zinc-200/50 text-zinc-600', 'bg-zinc-800 text-zinc-300')}`}>
                <MessageSquarePlus size={20} />
              </div>
              <span className={`text-[11px] font-bold tracking-wider uppercase ${t('text-zinc-500', 'text-zinc-400')}`}>Log</span>
            </button>
          </div>
        </div>
      );
    };

    // ==========================================
    // 5. MAIN APP COMPONENT
    // ==========================================
    function App() {
      // App State
      const [dataLoading, setDataLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('Synced');
      const isInitialDataLoad = useRef(true);
      const isRemoteUpdate = useRef(false);

      const [activeTab, setActiveTab] = useState('contacts'); // 'contacts' or 'stats'
      const [zenMode, setZenMode] = useState(false); // Focus Mode State

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [tags, setTags] = useState(DEFAULT_TAGS);
      const [quickActivities, setQuickActivities] = useState(DEFAULT_QUICK_ACTIVITIES);
      const [contacts, setContacts] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [filterTag, setFilterTag] = useState('All');
      const [sortOrder, setSortOrder] = useState('oldest');

      // Modals & Interactivity
      const [isSettingsMenuOpen, setIsSettingsMenuOpen] = useState(false);
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isManageTagsOpen, setIsManageTagsOpen] = useState(false);
      const [isManageActivitiesOpen, setIsManageActivitiesOpen] = useState(false);
      const [contactToDelete, setContactToDelete] = useState(null);
      const [loggingInteractionFor, setLoggingInteractionFor] = useState(null);
      const [viewingHistoryFor, setViewingHistoryFor] = useState(null);
      
      // Toast System
      const [toastMsg, setToastMsg] = useState('');
      const toastTimeoutRef = useRef(null);
      
      const showToast = (msg) => {
        setToastMsg(msg);
        if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
        toastTimeoutRef.current = setTimeout(() => setToastMsg(''), 3000);
      };

      // Multi-Log Feature State
      const [isMultiLogModalOpen, setIsMultiLogModalOpen] = useState(false);
      const [multiLogSelectedIds, setMultiLogSelectedIds] = useState([]);
      const [multiLogSearch, setMultiLogSearch] = useState('');

      const [newFirstName, setNewFirstName] = useState('');
      const [newLastName, setNewLastName] = useState('');
      const [newTag, setNewTag] = useState('');
      const [newTargetFreq, setNewTargetFreq] = useState(30);
      const [newBirthday, setNewBirthday] = useState('');
      const [newIsPinned, setNewIsPinned] = useState(false);
      
      const [newTagInput, setNewTagInput] = useState('');
      const [newActivityInput, setNewActivityInput] = useState('');
      
      const [interactionDate, setInteractionDate] = useState('');
      const [interactionNote, setInteractionNote] = useState('');

      const [editingContactDetails, setEditingContactDetails] = useState(null);
      const [editingInteraction, setEditingInteraction] = useState(null);

      const fileInputRef = useRef(null);
      const t = (light, dark) => isDarkMode ? dark : light;

      // Warn user if they try to close the app while data is still syncing to the cloud
      useEffect(() => {
        const handleBeforeUnload = (e) => {
          if (syncStatus === 'Syncing...') {
            e.preventDefault();
            e.returnValue = '';
          }
        };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [syncStatus]);

      // Update mobile status bar and body background when theme changes
      useEffect(() => {
        const color = isDarkMode ? '#09090b' : '#FAFAFA'; // #09090b is Tailwind's zinc-950
        document.documentElement.style.backgroundColor = color;
        document.body.style.backgroundColor = color;
        
        let metaThemeColor = document.getElementById('theme-color-meta');
        if (metaThemeColor) {
          metaThemeColor.setAttribute("content", color);
        }
      }, [isDarkMode]);

      // Pull data from Firestore on mount
      useEffect(() => {
        setDataLoading(true);
        isInitialDataLoad.current = true;

        const unsubscribe = db.collection('crm_data').doc(SHARED_DOC_ID).onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            if (!doc.metadata.hasPendingWrites) {
              isRemoteUpdate.current = true; 
              
              setContacts(data.contacts || []);
              setTags(data.tags || DEFAULT_TAGS);
              setQuickActivities(data.quickActivities || DEFAULT_QUICK_ACTIVITIES);
              setIsDarkMode(data.isDarkMode !== undefined ? data.isDarkMode : false);
            }
          }
          setDataLoading(false);
          setTimeout(() => { isInitialDataLoad.current = false; }, 500);
        }, error => {
          console.error("Error syncing data:", error);
          setDataLoading(false);
        });

        return () => unsubscribe();
      }, []);

      // Push data to Firestore whenever local state changes
      useEffect(() => {
        if (isInitialDataLoad.current || dataLoading) return;
        
        if (isRemoteUpdate.current) {
          isRemoteUpdate.current = false;
          return;
        }
        
        setSyncStatus('Syncing...');
        
        db.collection('crm_data').doc(SHARED_DOC_ID).set({
          contacts,
          tags,
          quickActivities,
          isDarkMode,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
          setTimeout(() => setSyncStatus('Synced'), 600);
        })
        .catch(err => {
          console.error('Error saving to cloud:', err);
          setSyncStatus('Sync Error');
        });

      }, [contacts, tags, quickActivities, isDarkMode, dataLoading]);

      // Manual Sync Function for Peace of Mind
      const handleManualSync = async () => {
        if (syncStatus === 'Syncing...') return;
        setSyncStatus('Syncing...');
        try {
          await db.collection('crm_data').doc(SHARED_DOC_ID).set({
            contacts, tags, quickActivities, isDarkMode,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          setSyncStatus('Synced');
          showToast("Data securely synced!");
        } catch (err) {
          console.error('Error saving to cloud:', err);
          setSyncStatus('Sync Error');
          showToast("Error syncing data.");
        }
      };

      // Global Key Handler
      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') {
            setIsSettingsMenuOpen(false);
            setIsAddModalOpen(false);
            setIsManageTagsOpen(false);
            setIsManageActivitiesOpen(false);
            setContactToDelete(null);
            setLoggingInteractionFor(null);
            setViewingHistoryFor(null);
            setEditingContactDetails(null);
            setEditingInteraction(null);
            setIsMultiLogModalOpen(false);
          }
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, []);

      const handleBackdropClick = (e, closeFn) => {
        if (e.target === e.currentTarget) closeFn();
      };

      useEffect(() => {
         if (isAddModalOpen && tags.length > 0 && !newTag) setNewTag(tags[0]);
      }, [isAddModalOpen, tags, newTag]);

      // Advanced Search & Sorting
      const sortedAndFilteredContacts = useMemo(() => {
        let filtered = contacts.filter(c => {
          // If Zen Mode is active, immediately drop healthy people (unless they are pinned)
          // Actually, we process Zen Mode here to completely hide them from the regular list.
          if (zenMode && getAttentionRatio(c) <= 0.75) {
             return false;
          }

          const searchLower = searchQuery.toLowerCase();
          
          // 1. Check basic profile text
          const matchName = `${c.firstName} ${c.lastName}`.toLowerCase().includes(searchLower);
          const matchTagFilter = c.tag && c.tag.toLowerCase().includes(searchLower);
          
          // 2. Deep search through interaction notes and specific dates
          const matchInteractions = c.interactions && c.interactions.some(i => {
            if (i.note && i.note.toLowerCase().includes(searchLower)) return true;
            const d = new Date(i.date);
            if (isNaN(d.getTime())) return false;
            
            const dateStr1 = d.toLocaleDateString().toLowerCase(); 
            const dateStr2 = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }).toLowerCase(); 
            const dateStr3 = d.toLocaleDateString(undefined, { month: 'long', day: 'numeric' }).toLowerCase();
            const dateStr4 = i.date.split('T')[0]; 
            
            return dateStr1.includes(searchLower) || dateStr2.includes(searchLower) || dateStr3.includes(searchLower) || dateStr4.includes(searchLower);
          });
            
          const matchSearch = matchName || matchTagFilter || matchInteractions;
          const matchTagBtn = filterTag === 'All' || c.tag === filterTag;
          
          return matchSearch && matchTagBtn;
        });

        return filtered.sort((a, b) => {
          if (sortOrder === 'alphabetical') return a.firstName.localeCompare(b.firstName);
          if (sortOrder === 'birthday') return getDaysUntilBirthday(a.birthday) - getDaysUntilBirthday(b.birthday);
          
          const latestA = getLatestInteraction(a);
          const latestB = getLatestInteraction(b);
          const dateA = latestA?.date || 0;
          const dateB = latestB?.date || 0;
          
          if (sortOrder === 'recent') return new Date(dateB) - new Date(dateA);
          
          // Urgency sort (Needs Attention). Highest ratio (most overdue) goes to the top.
          return getAttentionRatio(b) - getAttentionRatio(a);
        });
      }, [contacts, searchQuery, filterTag, sortOrder, zenMode]);

      // Extract Pinned Contacts
      const pinnedContacts = useMemo(() => {
         return contacts.filter(c => c.isPinned).sort((a,b) => a.firstName.localeCompare(b.firstName));
      }, [contacts]);

      const handleAddContact = (e) => {
        e.preventDefault();
        if (!newFirstName.trim()) return;

        setContacts([...contacts, {
          id: crypto.randomUUID(),
          firstName: newFirstName.trim(),
          lastName: newLastName.trim(),
          tag: newTag || (tags.length > 0 ? tags[0] : ''),
          targetFrequency: Number(newTargetFreq),
          birthday: newBirthday,
          isPinned: newIsPinned,
          interactions: [{ id: crypto.randomUUID(), date: new Date().toISOString(), note: 'Added to connections' }]
        }]);
        
        showToast(`${newFirstName.trim()} added!`);
        setNewFirstName(''); setNewLastName(''); setNewTargetFreq(30); setNewBirthday(''); setNewIsPinned(false); setIsAddModalOpen(false);
      };

      const handleSaveEditContact = (e) => {
        e.preventDefault();
        if (!editingContactDetails.firstName.trim()) return;

        setContacts(contacts.map(c => c.id === editingContactDetails.id ? { ...c, ...editingContactDetails, targetFrequency: Number(editingContactDetails.targetFrequency) } : c));
        setEditingContactDetails(null);
        showToast("Profile updated");
      };

      const openEditContactModal = (contact) => {
        setEditingContactDetails({ ...contact });
      };

      const handleSnoozeContact = (contact) => {
        const isCurrentlySnoozed = contact.snoozeUntil && new Date(contact.snoozeUntil) > new Date();
        
        if (isCurrentlySnoozed) {
          setContacts(contacts.map(c => c.id === contact.id ? { ...c, snoozeUntil: null } : c));
          showToast(`${contact.firstName} un-snoozed`);
        } else {
          const nextWeek = new Date();
          nextWeek.setDate(nextWeek.getDate() + 7);
          setContacts(contacts.map(c => c.id === contact.id ? { ...c, snoozeUntil: nextWeek.toISOString() } : c));
          showToast(`${contact.firstName} snoozed for 7 days`);
        }
      };

      const appendQuickActivity = (activityText) => {
        setInteractionNote(prev => prev ? `${prev} ${activityText}` : activityText);
      };

      const handleLogInteraction = (e) => {
        e.preventDefault();
        if (!loggingInteractionFor || !interactionDate) return;
        
        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === loggingInteractionFor.id ? { 
          ...c, 
          interactions: [...c.interactions, { id: crypto.randomUUID(), date: newDate.toISOString(), note: interactionNote.trim() }] 
        } : c));
        
        showToast(`Interaction with ${loggingInteractionFor.firstName} logged!`);
        setLoggingInteractionFor(null);
      };

      const handleMultiLogSubmit = (e) => {
        e.preventDefault();
        if (multiLogSelectedIds.length === 0 || !interactionDate) return;

        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => {
          if (multiLogSelectedIds.includes(c.id)) {
            return {
              ...c,
              interactions: [...c.interactions, { id: crypto.randomUUID(), date: newDate.toISOString(), note: interactionNote.trim() }]
            };
          }
          return c;
        }));

        showToast(`Group interaction logged for ${multiLogSelectedIds.length} people!`);
        setIsMultiLogModalOpen(false);
      };

      const openMultiLogModal = () => {
        setMultiLogSelectedIds([]);
        setMultiLogSearch('');
        const d = new Date();
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote('');
        setIsMultiLogModalOpen(true);
      }

      const handleSaveEditInteraction = (e) => {
        e.preventDefault();
        if (!editingInteraction || !interactionDate) return;

        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === editingInteraction.contactId ? {
          ...c,
          interactions: c.interactions.map(i => i.id === editingInteraction.id ? { ...i, date: newDate.toISOString(), note: interactionNote.trim() } : i)
        } : c));

        setEditingInteraction(null);
        setViewingHistoryFor(contacts.find(c => c.id === editingInteraction.contactId));
        showToast("Note updated");
      };

      const handleDeleteInteraction = (contactId, interactionId) => {
        if(confirm("Are you sure you want to delete this note?")) {
           const updatedContacts = contacts.map(c => c.id === contactId ? {
             ...c,
             interactions: c.interactions.filter(i => i.id !== interactionId)
           } : c);
           setContacts(updatedContacts);
           setViewingHistoryFor(updatedContacts.find(c => c.id === contactId));
           showToast("Note deleted");
        }
      };

      const openLogModal = (contact) => {
        setLoggingInteractionFor(contact);
        const d = new Date();
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote('');
      };

      const openEditInteractionModal = (contact, interaction) => {
        setEditingInteraction({ contactId: contact.id, id: interaction.id });
        const d = new Date(interaction.date);
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote(interaction.note || '');
      };

      const handleDeleteContact = () => {
        if (contactToDelete) {
          setContacts(contacts.filter(c => c.id !== contactToDelete.id));
          showToast(`${contactToDelete.firstName} removed`);
          setContactToDelete(null);
        }
      };

      // Tag Management
      const handleAddTag = (e) => {
        e.preventDefault();
        if (newTagInput.trim() && !tags.includes(newTagInput.trim())) {
          setTags([...tags, newTagInput.trim()]);
          setNewTagInput('');
        }
      };

      const handleDeleteTag = (tagToDelete) => {
        setTags(tags.filter(t => t !== tagToDelete));
        setContacts(contacts.map(c => c.tag === tagToDelete ? { ...c, tag: '' } : c));
        if (filterTag === tagToDelete) setFilterTag('All');
      };

      // Activity Management
      const handleAddActivity = (e) => {
        e.preventDefault();
        if (newActivityInput.trim() && !quickActivities.includes(newActivityInput.trim())) {
          setQuickActivities([...quickActivities, newActivityInput.trim()]);
          setNewActivityInput('');
        }
      };

      const handleDeleteActivity = (actToDelete) => {
        setQuickActivities(quickActivities.filter(a => a !== actToDelete));
      };

      // Data IO
      const handleExportData = () => {
        const dataStr = JSON.stringify(contacts, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `personal-crm-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
        showToast("Backup exported!");
      };

      const handleImportData = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (Array.isArray(importedData)) {
               setContacts(importedData);
               showToast("Backup imported successfully!");
            }
          } catch (error) { 
            console.error('Failed to parse backup');
            showToast("Error importing file");
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      // Calculations for Stats Page
      const stats = useMemo(() => {
        let red = 0, yellow = 0, green = 0, never = 0;
        let totalInteractions = 0;
        let thisMonthInteractions = 0;

        const now = new Date();
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();

        contacts.forEach(c => {
          const ratio = getAttentionRatio(c);
          if (ratio === Infinity) never++;
          else if (ratio > 1) red++;
          else if (ratio > 0.75) yellow++;
          else green++;

          if (c.interactions) {
            totalInteractions += c.interactions.length;
            c.interactions.forEach(i => {
              const d = new Date(i.date);
              if (d.getMonth() === thisMonth && d.getFullYear() === thisYear) {
                thisMonthInteractions++;
              }
            });
          }
        });

        return { red, yellow, green, never, totalInteractions, thisMonthInteractions, total: contacts.length };
      }, [contacts]);


      if (dataLoading) {
        return <div className="min-h-[100dvh] bg-[#FAFAFA] flex items-center justify-center font-sans text-zinc-500">Loading your CRM...</div>;
      }

      return (
        <div className={`min-h-[100dvh] font-sans safe-pb transition-colors duration-200 ${t('bg-[#FAFAFA] text-zinc-800', 'bg-zinc-950 text-zinc-100')}`}>
          
          {/* Main Content Area */}
          <div className="p-4 sm:p-10 max-w-3xl mx-auto pb-24">
            
            <header className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 sm:mb-10">
              <div>
                <div className="flex items-center gap-3">
                  <h1 className={`text-3xl font-bold tracking-tight ${t('text-zinc-900', 'text-white')}`}>Connections</h1>
                  <button 
                    onClick={handleManualSync}
                    disabled={syncStatus === 'Syncing...'}

                          key={act} 
                          onClick={() => appendQuickActivity(act)} 
                          className={`whitespace-nowrap px-3.5 py-2 text-xs font-semibold rounded-xl border shadow-sm active:scale-95 transition-all duration-200 select-none ${t('bg-white border-zinc-200 hover:border-zinc-300 hover:bg-zinc-50 text-zinc-700 active:bg-zinc-100', 'bg-zinc-800 border-zinc-700 hover:border-zinc-600 hover:bg-zinc-700 text-zinc-300 active:bg-zinc-600')}`}
                        >
                          {act}
                        </button>
                      ))}
                    </div>
                    <textarea rows="3" placeholder="What did you talk about?" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 sm:text-sm resize-none shadow-sm transition-shadow ${t('border-zinc-200 bg-white focus:ring-zinc-900 focus:border-zinc-900 text-zinc-900', 'border-zinc-700 bg-zinc-900 focus:ring-zinc-100 focus:border-zinc-100 text-white')}`} />
                  </div>
                  <div className="mt-8 pt-2 flex justify-end gap-3">
                    <button type="button" onClick={() => setLoggingInteractionFor(null)} className={`px-5 py-2.5 text-sm font-semibold rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-5 py-2.5 text-sm font-semibold rounded-xl transition-all shadow-sm ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')} active:scale-95`}>Save Interaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Delete Confirmation Modal */}
          {contactToDelete && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setContactToDelete(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-semibold mb-3 ${t('text-zinc-900', 'text-white')}`}>Remove Connection?</h2>
                <p className={`text-sm mb-6 ${t('text-zinc-600', 'text-zinc-400')}`}>Are you sure you want to remove {contactToDelete.firstName} from your list? This action cannot be undone.</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setContactToDelete(null)} className={`px-4 py-2 text-sm font-semibold rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                  <button onClick={handleDeleteContact} className="px-4 py-2 text-sm font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-xl transition-colors">Yes, remove</button>
                </div>
              </div>
            </div>
          )}

          {/* View History Modal */}
          {viewingHistoryFor && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setViewingHistoryFor(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')} flex flex-col max-h-[80vh]`}>
                <div className="flex items-center justify-between mb-5">
                  <h2 className={`text-xl font-semibold ${t('text-zinc-900', 'text-white')}`}>Interaction History</h2>
                  <button onClick={() => setViewingHistoryFor(null)} className={`p-1.5 rounded-lg transition-colors ${t('text-zinc-400 hover:bg-zinc-100', 'text-zinc-500 hover:bg-zinc-800')}`}><X size={20}/></button>
                </div>
                <div className="flex items-center gap-3 mb-4">
                  <div className={`h-8 w-8 rounded-full flex items-center justify-center font-bold text-[10px] shrink-0 shadow-sm ${getAvatarColorClass(`${viewingHistoryFor.firstName} ${viewingHistoryFor.lastName}`, isDarkMode)}`}>
                    {viewingHistoryFor.firstName.charAt(0)}{viewingHistoryFor.lastName ? viewingHistoryFor.lastName.charAt(0) : ''}
                  </div>
                  <p className={`text-sm font-semibold ${t('text-zinc-700', 'text-zinc-300')}`}>{viewingHistoryFor.firstName} {viewingHistoryFor.lastName}</p>
                </div>
                
                <div className="overflow-y-auto flex-1 pr-2 space-y-4 no-scrollbar">
                  {[...viewingHistoryFor.interactions].sort((a,b) => new Date(b.date) - new Date(a.date)).map(interaction => (
                    <div key={interaction.id} className={`group/item p-4 rounded-2xl border relative ${t('bg-zinc-50 border-zinc-200', 'bg-zinc-800/30 border-zinc-700')}`}>
                      <div className="flex justify-between items-start">
                        <span className={`text-xs font-semibold px-2 py-1 rounded-md ${t('bg-white text-zinc-600 border border-zinc-200', 'bg-zinc-900 text-zinc-300 border-zinc-700')}`}>
                          {new Date(interaction.date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}
                        </span>
                        <div className="flex items-center gap-1 opacity-100 sm:opacity-0 group-hover/item:opacity-100 transition-opacity">
                          <button onClick={() => openEditInteractionModal(viewingHistoryFor, interaction)} className={`p-1.5 sm:p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="Edit note">
                            <Pencil size={14} className="sm:w-3 sm:h-3" />
                          </button>
                          <button onClick={() => handleDeleteInteraction(viewingHistoryFor.id, interaction.id)} className={`p-1.5 sm:p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-rose-500 hover:bg-rose-50', 'text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10')}`} title="Delete note">
                            <Trash2 size={14} className="sm:w-3 sm:h-3" />
                          </button>
                        </div>
                      </div>
                      {interaction.note && (
                        <p className={`mt-3 text-sm leading-relaxed ${t('text-zinc-700', 'text-zinc-300')}`}>{interaction.note}</p>
                      )}
                    </div>
                  ))}
                  {viewingHistoryFor.interactions.length === 0 && (
                    <p className={`text-center py-6 text-sm ${t('text-zinc-500', 'text-zinc-500')}`}>No interactions recorded yet.</p>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Edit Interaction Modal */}
          {editingInteraction && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setEditingInteraction(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-semibold mb-5 ${t('text-zinc-900', 'text-white')}`}>Edit Interaction</h2>
                <form onSubmit={handleSaveEditInteraction} className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-1.5 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 sm:text-sm shadow-sm transition-shadow ${t('border-zinc-200 bg-white focus:ring-zinc-900 text-zinc-900', 'border-zinc-700 bg-zinc-900 focus:ring-zinc-400 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1.5 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="3" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2.5 border rounded-xl focus:outline-none focus:ring-2 sm:text-sm resize-none shadow-sm transition-shadow ${t('border-zinc-200 bg-white focus:ring-zinc-900 focus:border-zinc-900 text-zinc-900', 'border-zinc-700 bg-zinc-900 focus:ring-zinc-100 focus:border-zinc-100 text-white')}`} />
                  </div>
                  <div className="mt-8 pt-2 flex justify-end gap-3">
                    <button type="button" onClick={() => setEditingInteraction(null)} className={`px-5 py-2.5 text-sm font-semibold rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-5 py-2.5 text-sm font-semibold rounded-xl transition-all shadow-sm ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')} active:scale-95`}>Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
