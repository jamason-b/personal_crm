<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal CRM</title>
  
  <!-- Load React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Load Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Load Firebase Compat SDKs (Auth removed) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================
    // 1. PASTE YOUR FIREBASE CONFIG HERE
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyB9s5odA5RIBPXmBumdSl59D89DBv9cZIQ",
      authDomain: "personal-budget-app-aeb06.firebaseapp.com",
      databaseURL: "https://personal-budget-app-aeb06-default-rtdb.firebaseio.com",
      projectId: "personal-budget-app-aeb06",
      storageBucket: "personal-budget-app-aeb06.firebasestorage.app",
      messagingSenderId: "116796553317",
      appId: "1:116796553317:web:71f4b1d1278bd185226e8c"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // The shared hardcoded location for your single-user data
    const SHARED_DOC_ID = 'shared_workspace';

    // --- Inline Icons ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const UserPlus = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const CalendarDays = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
    const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
    const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
    const MessageSquarePlus = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></Icon>;
    const Tag = (p) => <Icon {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ArrowUpDown = (p) => <Icon {...p}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></Icon>;
    const Pencil = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const Gift = (p) => <Icon {...p}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></Icon>;

    // --- App Code ---
    const DEFAULT_TAGS = ['Family', 'OG Friend', 'Mission Friend', 'School Friend'];

    const getAvatarColor = (name, isDark, needsAttention) => {
      if (needsAttention) {
        return isDark ? 'bg-rose-500/20 text-rose-300' : 'bg-rose-100 text-rose-700';
      }

      const colors = isDark 
        ? ['bg-green-500/20 text-green-300', 'bg-emerald-500/20 text-emerald-300', 'bg-teal-500/20 text-teal-300', 'bg-cyan-500/20 text-cyan-300', 'bg-blue-500/20 text-blue-300', 'bg-indigo-500/20 text-indigo-300', 'bg-violet-500/20 text-violet-300', 'bg-purple-500/20 text-purple-300', 'bg-fuchsia-500/20 text-fuchsia-300']
        : ['bg-green-100 text-green-700', 'bg-emerald-100 text-emerald-700', 'bg-teal-100 text-teal-700', 'bg-cyan-100 text-cyan-700', 'bg-blue-100 text-blue-700', 'bg-indigo-100 text-indigo-700', 'bg-violet-100 text-violet-700', 'bg-purple-100 text-purple-700', 'bg-fuchsia-100 text-fuchsia-700'];
      
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    };

    // --- Main App Component ---
    function App() {
      // App State
      const [dataLoading, setDataLoading] = useState(true);
      const isInitialDataLoad = useRef(true);

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [tags, setTags] = useState(DEFAULT_TAGS);
      const [contacts, setContacts] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [filterTag, setFilterTag] = useState('All');
      const [sortOrder, setSortOrder] = useState('oldest');

      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isManageTagsOpen, setIsManageTagsOpen] = useState(false);
      const [contactToDelete, setContactToDelete] = useState(null);
      const [loggingInteractionFor, setLoggingInteractionFor] = useState(null);
      const [viewingHistoryFor, setViewingHistoryFor] = useState(null);

      const [newFirstName, setNewFirstName] = useState('');
      const [newLastName, setNewLastName] = useState('');
      const [newTag, setNewTag] = useState('');
      const [newTargetFreq, setNewTargetFreq] = useState(30);
      const [newBirthday, setNewBirthday] = useState('');
      const [newTagInput, setNewTagInput] = useState('');
      
      const [interactionDate, setInteractionDate] = useState('');
      const [interactionNote, setInteractionNote] = useState('');

      const [editingContactDetails, setEditingContactDetails] = useState(null);
      const [editingInteraction, setEditingInteraction] = useState(null);

      const fileInputRef = useRef(null);
      const t = (light, dark) => isDarkMode ? dark : light;

      // Pull data from Firestore on mount
      useEffect(() => {
        setDataLoading(true);
        isInitialDataLoad.current = true;

        const unsubscribe = db.collection('crm_data').doc(SHARED_DOC_ID).onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            // We check hasPendingWrites so we don't accidentally overwrite local state 
            // while a local save is currently traveling to the server.
            if (!doc.metadata.hasPendingWrites) {
              setContacts(data.contacts || []);
              setTags(data.tags || DEFAULT_TAGS);
              setIsDarkMode(data.isDarkMode || false);
            }
          }
          setDataLoading(false);
          // Wait a tiny bit before allowing writes to ensure state has settled
          setTimeout(() => { isInitialDataLoad.current = false; }, 500);
        }, error => {
          console.error("Error syncing data:", error);
          setDataLoading(false);
        });

        return () => unsubscribe();
      }, []);

      // Push data to Firestore whenever local state changes
      useEffect(() => {
        if (isInitialDataLoad.current || dataLoading) return;
        
        // Save the updated state to the cloud shared workspace
        db.collection('crm_data').doc(SHARED_DOC_ID).set({
          contacts,
          tags,
          isDarkMode,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

      }, [contacts, tags, isDarkMode, dataLoading]);

      // Global Key Handler
      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') {
            setIsAddModalOpen(false);
            setIsManageTagsOpen(false);
            setContactToDelete(null);
            setLoggingInteractionFor(null);
            setViewingHistoryFor(null);
          }
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, []);

      const handleBackdropClick = (e, closeFn) => {
        if (e.target === e.currentTarget) closeFn();
      };

      // Ensure form has default tag ready when opened
      useEffect(() => {
         if (isAddModalOpen && tags.length > 0 && !newTag) setNewTag(tags[0]);
      }, [isAddModalOpen, tags, newTag]);

      const getLatestInteraction = (contact) => {
        if (!contact.interactions || contact.interactions.length === 0) return null;
        return [...contact.interactions].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
      };

      const getRelativeTime = (dateString) => {
        if (!dateString) return 'Never';
        const date = new Date(dateString);
        const now = new Date();
        date.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
        const diffDays = Math.round(Math.abs(now - date) / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return 'Today';
        if (diffDays === 1) return 'Yesterday';
        if (diffDays < 7) return `${diffDays} days ago`;
        if (diffDays < 30) return `${Math.floor(diffDays / 7)} ${Math.floor(diffDays / 7) === 1 ? 'week' : 'weeks'} ago`;
        if (diffDays < 365) return `${Math.floor(diffDays / 30)} ${Math.floor(diffDays / 30) === 1 ? 'month' : 'months'} ago`;
        return `${Math.floor(diffDays / 365)} ${Math.floor(diffDays / 365) === 1 ? 'year' : 'years'} ago`;
      };

      const getStatusColor = (contact) => {
        const latest = getLatestInteraction(contact);
        if (!latest) return t('bg-zinc-100 text-zinc-500', 'bg-zinc-800 text-zinc-400');
        
        const diffDays = Math.round(Math.abs(new Date() - new Date(latest.date)) / (1000 * 60 * 60 * 24));
        const freq = contact.targetFrequency || 30;

        if (diffDays <= freq * 0.5) return t('bg-emerald-100 text-emerald-700', 'bg-emerald-500/10 text-emerald-400');
        if (diffDays <= freq) return t('bg-amber-100 text-amber-700', 'bg-amber-500/10 text-amber-400');
        return t('bg-rose-100 text-rose-700', 'bg-rose-500/10 text-rose-400');
      };

      const isBirthdayUpcoming = (birthdayStr) => {
        if (!birthdayStr) return false;
        const today = new Date();
        today.setHours(0,0,0,0);
        const [year, month, day] = birthdayStr.split('-');
        const bdayThisYear = new Date(today.getFullYear(), month - 1, day);
        
        // If birthday already passed this year, check next year
        if (bdayThisYear < today && (today - bdayThisYear) > 1000 * 60 * 60 * 24) {
           bdayThisYear.setFullYear(today.getFullYear() + 1);
        }
        
        const diffDays = Math.round((bdayThisYear - today) / (1000 * 60 * 60 * 24));
        return diffDays >= 0 && diffDays <= 7;
      };

      const sortedAndFilteredContacts = useMemo(() => {
        let filtered = contacts.filter(c => {
          const searchLower = searchQuery.toLowerCase();
          const matchSearch = 
            `${c.firstName} ${c.lastName}`.toLowerCase().includes(searchLower) ||
            (c.tag && c.tag.toLowerCase().includes(searchLower)) ||
            (c.interactions && c.interactions.some(i => i.note && i.note.toLowerCase().includes(searchLower)));
            
          const matchTag = filterTag === 'All' || c.tag === filterTag;
          return matchSearch && matchTag;
        });

        return filtered.sort((a, b) => {
          if (sortOrder === 'alphabetical') return a.firstName.localeCompare(b.firstName);
          
          const dateA = getLatestInteraction(a)?.date || 0;
          const dateB = getLatestInteraction(b)?.date || 0;
          
          if (sortOrder === 'recent') return new Date(dateB) - new Date(dateA);
          return new Date(dateA) - new Date(dateB);
        });
      }, [contacts, searchQuery, filterTag, sortOrder]);

      const handleAddContact = (e) => {
        e.preventDefault();
        if (!newFirstName.trim()) return;

        setContacts([...contacts, {
          id: crypto.randomUUID(),
          firstName: newFirstName.trim(),
          lastName: newLastName.trim(),
          tag: newTag || (tags.length > 0 ? tags[0] : ''),
          targetFrequency: Number(newTargetFreq),
          birthday: newBirthday,
          interactions: [{ id: crypto.randomUUID(), date: new Date().toISOString(), note: 'Added to connections' }]
        }]);
        
        setNewFirstName(''); setNewLastName(''); setNewTargetFreq(30); setNewBirthday(''); setIsAddModalOpen(false);
      };

      const handleSaveEditContact = (e) => {
        e.preventDefault();
        if (!editingContactDetails.firstName.trim()) return;

        setContacts(contacts.map(c => c.id === editingContactDetails.id ? { ...c, ...editingContactDetails, targetFrequency: Number(editingContactDetails.targetFrequency) } : c));
        setEditingContactDetails(null);
      };

      const openEditContactModal = (contact) => {
        setEditingContactDetails({ ...contact });
      };

      const handleQuickTalkToday = (id) => {
        setContacts(contacts.map(c => c.id === id ? { 
          ...c, 
          interactions: [...c.interactions, { id: crypto.randomUUID(), date: new Date().toISOString(), note: '' }] 
        } : c));
      };

      const handleLogInteraction = (e) => {
        e.preventDefault();
        if (!loggingInteractionFor || !interactionDate) return;
        
        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === loggingInteractionFor.id ? { 
          ...c, 
          interactions: [...c.interactions, { id: crypto.randomUUID(), date: newDate.toISOString(), note: interactionNote.trim() }] 
        } : c));
        
        setLoggingInteractionFor(null);
      };

      const handleSaveEditInteraction = (e) => {
        e.preventDefault();
        if (!editingInteraction || !interactionDate) return;

        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === editingInteraction.contactId ? {
          ...c,
          interactions: c.interactions.map(i => i.id === editingInteraction.id ? { ...i, date: newDate.toISOString(), note: interactionNote.trim() } : i)
        } : c));

        setEditingInteraction(null);
        setViewingHistoryFor(contacts.find(c => c.id === editingInteraction.contactId));
      };

      const handleDeleteInteraction = (contactId, interactionId) => {
        if(confirm("Are you sure you want to delete this interaction?")) {
           const updatedContacts = contacts.map(c => c.id === contactId ? {
             ...c,
             interactions: c.interactions.filter(i => i.id !== interactionId)
           } : c);
           setContacts(updatedContacts);
           setViewingHistoryFor(updatedContacts.find(c => c.id === contactId));
        }
      };

      const openLogModal = (contact) => {
        setLoggingInteractionFor(contact);
        const d = new Date();
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote('');
      };

      const openEditInteractionModal = (contact, interaction) => {
        setEditingInteraction({ contactId: contact.id, id: interaction.id });
        const d = new Date(interaction.date);
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote(interaction.note || '');
      };

      const handleDeleteContact = () => {
        if (contactToDelete) {
          setContacts(contacts.filter(c => c.id !== contactToDelete.id));
          setContactToDelete(null);
        }
      };

      const handleAddTag = (e) => {
        e.preventDefault();
        if (newTagInput.trim() && !tags.includes(newTagInput.trim())) {
          setTags([...tags, newTagInput.trim()]);
          setNewTagInput('');
        }
      };

      const handleDeleteTag = (tagToDelete) => {
        setTags(tags.filter(t => t !== tagToDelete));
        setContacts(contacts.map(c => c.tag === tagToDelete ? { ...c, tag: '' } : c));
        if (filterTag === tagToDelete) setFilterTag('All');
      };

      const handleExportData = () => {
        const dataStr = JSON.stringify(contacts, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `personal-crm-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (Array.isArray(importedData)) setContacts(importedData);
          } catch (error) { console.error('Failed to parse backup'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      if (dataLoading) {
        return <div className="min-h-screen bg-[#FAFAFA] flex items-center justify-center font-sans text-zinc-500">Loading your CRM...</div>;
      }

      return (
        <div className={`min-h-screen font-sans p-6 sm:p-10 transition-colors duration-200 ${t('bg-[#FAFAFA] text-zinc-800', 'bg-zinc-950 text-zinc-100')}`}>
          <div className="max-w-3xl mx-auto">
            
            <header className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-10">
              <div>
                <h1 className={`text-3xl font-light tracking-tight ${t('text-zinc-900', 'text-white')}`}>Connections</h1>
                <p className={`mt-1 text-sm ${t('text-zinc-500', 'text-zinc-400')}`}>Stay mindful of your relationships.</p>
              </div>
              <div className="flex flex-wrap items-center gap-2 sm:gap-3">
                <input type="file" accept=".json" ref={fileInputRef} style={{ display: 'none' }} onChange={handleImportData} />
                <div className="flex bg-white dark:bg-zinc-900 rounded-full border border-zinc-200 dark:border-zinc-800 overflow-hidden shadow-sm">
                  <button onClick={() => fileInputRef.current?.click()} className={`p-2.5 transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800')}`} title="Import Backup"><Upload size={16} /></button>
                  <div className={`w-px ${t('bg-zinc-200', 'bg-zinc-800')}`}></div>
                  <button onClick={handleExportData} className={`p-2.5 transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800')}`} title="Export Backup"><Download size={16} /></button>
                </div>
                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2.5 rounded-full transition-colors border shadow-sm ${t('bg-white text-zinc-600 hover:bg-zinc-100 border-zinc-200', 'bg-zinc-900 text-zinc-400 hover:text-zinc-100 border-zinc-800 hover:bg-zinc-800')}`} title="Toggle theme">
                  {isDarkMode ? <Sun size={16} /> : <Moon size={16} />}
                </button>
                <button onClick={() => setIsAddModalOpen(true)} className={`inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-full text-sm font-medium transition-colors shadow-sm ${t('bg-zinc-900 text-white hover:bg-zinc-800', 'bg-white text-zinc-900 hover:bg-zinc-200')}`}>
                  <UserPlus size={16} /> Add Person
                </button>
              </div>
            </header>

            <div className="flex flex-col sm:flex-row gap-3 mb-6">
              <div className="relative flex-1">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

                </div>

                sortedAndFilteredContacts.map(contact => {
                  const latestInteraction = getLatestInteraction(contact);
                  const fullName = `${contact.firstName} ${contact.lastName}`;

                  let needsAttention = true;
                  if (latestInteraction) {
                    const date = new Date(latestInteraction.date);
                    const now = new Date();
                    date.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
                    const diffDays = Math.round(Math.abs(now - date) / (1000 * 60 * 60 * 24));
                    needsAttention = diffDays > (contact.targetFrequency || 30);
                  }

                  return (
                    <div key={contact.id} className={`group flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-2xl border shadow-sm hover:shadow-md transition-all duration-200 gap-4 ${t('bg-white border-zinc-100', 'bg-zinc-900 border-zinc-800/50 hover:border-zinc-700')}`}>
                      <div className="flex items-start sm:items-center gap-4">
                        <div className={`h-10 w-10 rounded-full flex items-center justify-center font-medium text-sm flex-shrink-0 ${getAvatarColor(fullName, isDarkMode, needsAttention)}`}>

                        <div>
                          <h3 className={`text-base font-medium flex items-center gap-2 ${t('text-zinc-900', 'text-zinc-100')}`}>

                          <div className="flex flex-wrap items-center gap-2 mt-1">

                              <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border ${t('bg-zinc-50 border-zinc-200 text-zinc-500', 'bg-zinc-800/50 border-zinc-700 text-zinc-400')}`}>
                                <Tag size={10} className="mr-1" />{contact.tag}
                              </span>
                            )}
                            {isBirthdayUpcoming(contact.birthday) && (
                              <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border ${t('bg-fuchsia-50 border-fuchsia-200 text-fuchsia-600', 'bg-fuchsia-500/10 border-fuchsia-500/20 text-fuchsia-400')}`} title="Birthday within 7 days!">
                                <Gift size={10} className="mr-1" /> Upcoming B-Day
                              </span>
                            )}

                            <p className={`mt-2 text-sm italic truncate max-w-[200px] sm:max-w-xs ${t('text-zinc-500', 'text-zinc-400')}`}>

                          </button>
                          <button onClick={() => handleQuickTalkToday(contact.id)} className={`inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg transition-colors border ${t('bg-zinc-50 hover:bg-zinc-100 text-zinc-700 border-zinc-200', 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-700')}`} title="Quick log today">

                          </button>
                        </div>
                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                          <button onClick={() => openEditContactModal(contact)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="Edit Contact">
                            <Pencil size={14} />
                          </button>
                          <button onClick={() => setViewingHistoryFor(contact)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="View history">
                            <History size={14} />
                          </button>
                          <button onClick={() => setContactToDelete(contact)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-rose-500 hover:bg-rose-50', 'text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10')}`} title="Remove connection">
                            <Trash2 size={14} />
                          </button>
                        </div>
                      </div>
                    </div>

                })

                <form onSubmit={handleAddContact} className="space-y-4">

                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>First Name</label>
                      <input type="text" required value={newFirstName} onChange={(e) => setNewFirstName(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Last Name</label>
                      <input type="text" value={newLastName} onChange={(e) => setNewLastName(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                  </div>
                  <div className="flex gap-4">

                    </div>

                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Target Freq. (Days)</label>

                    </div>
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Birthday <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>

                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setIsAddModalOpen(false)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" disabled={!newFirstName.trim()} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

                <form onSubmit={handleSaveEditContact} className="space-y-4">

                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>First Name</label>
                      <input type="text" required value={editingContactDetails.firstName} onChange={(e) => setEditingContactDetails({...editingContactDetails, firstName: e.target.value})} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Last Name</label>
                      <input type="text" value={editingContactDetails.lastName} onChange={(e) => setEditingContactDetails({...editingContactDetails, lastName: e.target.value})} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Group</label>
                      <select value={editingContactDetails.tag} onChange={(e) => setEditingContactDetails({...editingContactDetails, tag: e.target.value})} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`}>

                    </div>

                      <input type="number" min="1" required value={editingContactDetails.targetFrequency} onChange={(e) => setEditingContactDetails({...editingContactDetails, targetFrequency: e.target.value})} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Birthday <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <input type="date" value={editingContactDetails.birthday || ''} onChange={(e) => setEditingContactDetails({...editingContactDetails, birthday: e.target.value})} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setEditingContactDetails(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" disabled={!editingContactDetails.firstName.trim()} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save Changes</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Manage Tags Modal */}
          {isManageTagsOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setIsManageTagsOpen(false))}>
              <div className={`rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-5 ${t('text-zinc-900', 'text-white')}`}>Manage Groups</h2>
                <div className="space-y-3 mb-6 max-h-60 overflow-y-auto">
                  {tags.map(tag => (
                    <div key={tag} className={`flex items-center justify-between p-3 rounded-xl border ${t('bg-zinc-50 border-zinc-200', 'bg-zinc-800/50 border-zinc-700')}`}>
                      <span className={`text-sm font-medium ${t('text-zinc-700', 'text-zinc-300')}`}>{tag}</span>
                      <button onClick={() => handleDeleteTag(tag)} className="p-1 text-zinc-400 hover:text-rose-500 rounded-md transition-colors"><Trash2 size={16} /></button>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleAddTag} className="flex gap-2">
                  <input type="text" placeholder="New group name..." value={newTagInput} onChange={(e) => setNewTagInput(e.target.value)} className={`flex-1 px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                  <button type="submit" disabled={!newTagInput.trim()} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('bg-zinc-900 text-white', 'bg-white text-zinc-900 disabled:opacity-50')}`}>Add</button>
                </form>
                <div className="mt-6 flex justify-end">
                  <button onClick={() => setIsManageTagsOpen(false)} className={`px-4 py-2 text-sm font-medium rounded-xl ${t('bg-zinc-100 hover:bg-zinc-200', 'bg-zinc-800 hover:bg-zinc-700 text-white')}`}>Done</button>
                </div>
              </div>
            </div>
          )}

          {/* Log Interaction Modal */}
          {loggingInteractionFor && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setLoggingInteractionFor(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-1 ${t('text-zinc-900', 'text-white')}`}>Log Interaction</h2>
                <p className={`text-sm mb-5 ${t('text-zinc-500', 'text-zinc-400')}`}>With {loggingInteractionFor.firstName} {loggingInteractionFor.lastName}</p>
                <form onSubmit={handleLogInteraction} className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="3" placeholder="What did you talk about?" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm resize-none ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setLoggingInteractionFor(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save Interaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Delete Confirmation Modal */}
          {contactToDelete && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setContactToDelete(null))}>

          {viewingHistoryFor && (

              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')} flex flex-col max-h-[80vh]`}>
                <div className="flex items-center justify-between mb-5">
                  <h2 className={`text-xl font-medium ${t('text-zinc-900', 'text-white')}`}>Interaction History</h2>
                  <button onClick={() => setViewingHistoryFor(null)} className={`p-1.5 rounded-lg transition-colors ${t('text-zinc-400 hover:bg-zinc-100', 'text-zinc-500 hover:bg-zinc-800')}`}><X size={20}/></button>
                </div>
                <p className={`text-sm mb-4 font-medium ${t('text-zinc-700', 'text-zinc-300')}`}>{viewingHistoryFor.firstName} {viewingHistoryFor.lastName}</p>
                
                <div className="overflow-y-auto flex-1 pr-2 space-y-4">
                  {[...viewingHistoryFor.interactions].sort((a,b) => new Date(b.date) - new Date(a.date)).map(interaction => (
                    <div key={interaction.id} className={`group/item p-4 rounded-2xl border relative ${t('bg-zinc-50 border-zinc-200', 'bg-zinc-800/30 border-zinc-700')}`}>
                      <div className="flex justify-between items-start">
                        <span className={`text-xs font-medium px-2 py-1 rounded-md ${t('bg-white text-zinc-600 border border-zinc-200', 'bg-zinc-900 text-zinc-300 border-zinc-700')}`}>
                          {new Date(interaction.date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}
                        </span>
                        <div className="flex items-center gap-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
                          <button onClick={() => openEditInteractionModal(viewingHistoryFor, interaction)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="Edit note">
                            <Pencil size={12} />
                          </button>
                          <button onClick={() => handleDeleteInteraction(viewingHistoryFor.id, interaction.id)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-rose-500 hover:bg-rose-50', 'text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10')}`} title="Delete note">
                            <Trash2 size={12} />
                          </button>
                        </div>
                      </div>
                      {interaction.note && (
                        <p className={`mt-3 text-sm leading-relaxed ${t('text-zinc-700', 'text-zinc-300')}`}>{interaction.note}</p>
                      )}
                    </div>
                  ))}
                  {viewingHistoryFor.interactions.length === 0 && (
                    <p className={`text-center py-6 text-sm ${t('text-zinc-500', 'text-zinc-500')}`}>No interactions recorded yet.</p>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Edit Interaction Modal */}
          {editingInteraction && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setEditingInteraction(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-5 ${t('text-zinc-900', 'text-white')}`}>Edit Interaction</h2>
                <form onSubmit={handleSaveEditInteraction} className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="3" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm resize-none ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setEditingInteraction(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
