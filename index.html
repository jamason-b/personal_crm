  <!-- Custom Browser Icon (Favicon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👥</text></svg>">
  
  <!-- Generate iOS Home Screen Icon Dynamically -->
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      
      // Draw a sleek dark background
      ctx.fillStyle = '#18181b'; // Tailwind zinc-900 color
      ctx.fillRect(0, 0, 180, 180);
      
      // Draw the emoji completely filling the center
      ctx.font = '120px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // Placed exactly in the middle. Y is slightly offset (100 instead of 90) 
      // because emojis naturally sit a tiny bit high on the baseline.
      ctx.fillText('👥', 90, 100);
      
      // Convert to PNG and tell iOS to use it as the app icon
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================

    const firebaseConfig = {

    // --- Inline Icons ---

    const UserPlus = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;

    const CalendarDays = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;

    const Tag = (p) => <Icon {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ArrowUpDown = (p) => <Icon {...p}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></Icon>;
    const Pencil = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const Gift = (p) => <Icon {...p}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></Icon>;
    const Cloud = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;

    const DEFAULT_TAGS = ['Family', 'OG Friend', 'Mission Friend', 'School Friend'];

    const getAvatarColor = (name, isDark, needsAttention) => {
      if (needsAttention) {
        return isDark ? 'bg-rose-500/20 text-rose-300' : 'bg-rose-100 text-rose-700';
      }
      const colors = isDark 
        ? ['bg-green-500/20 text-green-300', 'bg-emerald-500/20 text-emerald-300', 'bg-teal-500/20 text-teal-300', 'bg-cyan-500/20 text-cyan-300', 'bg-blue-500/20 text-blue-300', 'bg-indigo-500/20 text-indigo-300', 'bg-violet-500/20 text-violet-300', 'bg-purple-500/20 text-purple-300', 'bg-fuchsia-500/20 text-fuchsia-300']
        : ['bg-green-100 text-green-700', 'bg-emerald-100 text-emerald-700', 'bg-teal-100 text-teal-700', 'bg-cyan-100 text-cyan-700', 'bg-blue-100 text-blue-700', 'bg-indigo-100 text-indigo-700', 'bg-violet-100 text-violet-700', 'bg-purple-100 text-purple-700', 'bg-fuchsia-100 text-fuchsia-700'];
      
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    };

    // --- Main App Component ---
    function App() {
      // App State
      const [dataLoading, setDataLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('Synced');
      const isInitialDataLoad = useRef(true);
      const isRemoteUpdate = useRef(false);

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [tags, setTags] = useState(DEFAULT_TAGS);
      const [contacts, setContacts] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [filterTag, setFilterTag] = useState('All');
      const [sortOrder, setSortOrder] = useState('oldest');

      // Modals
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isManageTagsOpen, setIsManageTagsOpen] = useState(false);
      const [contactToDelete, setContactToDelete] = useState(null);
      const [loggingInteractionFor, setLoggingInteractionFor] = useState(null);
      const [viewingHistoryFor, setViewingHistoryFor] = useState(null);
      
      // Multi-Log Feature State
      const [isMultiLogModalOpen, setIsMultiLogModalOpen] = useState(false);
      const [multiLogSelectedIds, setMultiLogSelectedIds] = useState([]);
      const [multiLogSearch, setMultiLogSearch] = useState('');

      const [newFirstName, setNewFirstName] = useState('');
      const [newLastName, setNewLastName] = useState('');
      const [newTag, setNewTag] = useState('');
      const [newTargetFreq, setNewTargetFreq] = useState(30);
      const [newBirthday, setNewBirthday] = useState('');
      const [newTagInput, setNewTagInput] = useState('');
      
      const [interactionDate, setInteractionDate] = useState('');
      const [interactionNote, setInteractionNote] = useState('');

      const [editingContactDetails, setEditingContactDetails] = useState(null);
      const [editingInteraction, setEditingInteraction] = useState(null);

      const fileInputRef = useRef(null);
      const t = (light, dark) => isDarkMode ? dark : light;

      // Update mobile status bar and body background when theme changes
      useEffect(() => {
        const color = isDarkMode ? '#09090b' : '#FAFAFA'; // #09090b is Tailwind's zinc-950
        document.documentElement.style.backgroundColor = color;
        document.body.style.backgroundColor = color;
        
        let metaThemeColor = document.getElementById('theme-color-meta');
        if (metaThemeColor) {
          metaThemeColor.setAttribute("content", color);
        }
      }, [isDarkMode]);

      // Pull data from Firestore on mount
      useEffect(() => {
        setDataLoading(true);
        isInitialDataLoad.current = true;

        const unsubscribe = db.collection('crm_data').doc(SHARED_DOC_ID).onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            if (!doc.metadata.hasPendingWrites) {
              isRemoteUpdate.current = true; 
              
              setContacts(data.contacts || []);
              setTags(data.tags || DEFAULT_TAGS);
              setIsDarkMode(data.isDarkMode !== undefined ? data.isDarkMode : false);
            }
          }
          setDataLoading(false);
          setTimeout(() => { isInitialDataLoad.current = false; }, 500);
        }, error => {
          console.error("Error syncing data:", error);
          setDataLoading(false);
        });

        return () => unsubscribe();
      }, []);

      // Push data to Firestore whenever local state changes
      useEffect(() => {
        if (isInitialDataLoad.current || dataLoading) return;
        
        if (isRemoteUpdate.current) {
          isRemoteUpdate.current = false;
          return;
        }
        
        setSyncStatus('Syncing...');
        
        db.collection('crm_data').doc(SHARED_DOC_ID).set({
          contacts,
          tags,
          isDarkMode,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
          setTimeout(() => setSyncStatus('Synced'), 600);
        })
        .catch(err => {
          console.error('Error saving to cloud:', err);
          setSyncStatus('Sync Error');
        });

      }, [contacts, tags, isDarkMode, dataLoading]);

      // Global Key Handler
      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') {
            setIsAddModalOpen(false);
            setIsManageTagsOpen(false);
            setContactToDelete(null);
            setLoggingInteractionFor(null);
            setViewingHistoryFor(null);
            setEditingContactDetails(null);
            setEditingInteraction(null);
            setIsMultiLogModalOpen(false);
          }
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, []);

      const handleBackdropClick = (e, closeFn) => {
        if (e.target === e.currentTarget) closeFn();
      };

      useEffect(() => {
         if (isAddModalOpen && tags.length > 0 && !newTag) setNewTag(tags[0]);
      }, [isAddModalOpen, tags, newTag]);

      const getLatestInteraction = (contact) => {
        if (!contact.interactions || contact.interactions.length === 0) return null;
        return [...contact.interactions].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
      };

      const getRelativeTime = (dateString) => {
        if (!dateString) return 'Never';
        const date = new Date(dateString);
        const now = new Date();
        date.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
        const diffDays = Math.round(Math.abs(now - date) / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return 'Today';
        if (diffDays === 1) return 'Yesterday';
        if (diffDays < 7) return `${diffDays} days ago`;
        if (diffDays < 30) return `${Math.floor(diffDays / 7)} ${Math.floor(diffDays / 7) === 1 ? 'week' : 'weeks'} ago`;
        if (diffDays < 365) return `${Math.floor(diffDays / 30)} ${Math.floor(diffDays / 30) === 1 ? 'month' : 'months'} ago`;
        return `${Math.floor(diffDays / 365)} ${Math.floor(diffDays / 365) === 1 ? 'year' : 'years'} ago`;
      };

      const getStatusColor = (contact) => {
        const latest = getLatestInteraction(contact);
        if (!latest) return t('bg-zinc-100 text-zinc-500', 'bg-zinc-800 text-zinc-400');
        
        const diffDays = Math.round(Math.abs(new Date() - new Date(latest.date)) / (1000 * 60 * 60 * 24));
        const freq = contact.targetFrequency || 30;

        if (diffDays <= freq * 0.5) return t('bg-emerald-100 text-emerald-700', 'bg-emerald-500/10 text-emerald-400');
        if (diffDays <= freq) return t('bg-amber-100 text-amber-700', 'bg-amber-500/10 text-amber-400');
        return t('bg-rose-100 text-rose-700', 'bg-rose-500/10 text-rose-400');
      };

      const isBirthdayUpcoming = (birthdayStr) => {
        if (!birthdayStr) return false;
        const today = new Date();
        today.setHours(0,0,0,0);
        const [year, month, day] = birthdayStr.split('-');
        const bdayThisYear = new Date(today.getFullYear(), month - 1, day);
        
        if (bdayThisYear < today && (today - bdayThisYear) > 1000 * 60 * 60 * 24) {
           bdayThisYear.setFullYear(today.getFullYear() + 1);
        }
        
        const diffDays = Math.round((bdayThisYear - today) / (1000 * 60 * 60 * 24));
        return diffDays >= 0 && diffDays <= 7;
      };

      // Advanced Search & Sorting
      const sortedAndFilteredContacts = useMemo(() => {
        let filtered = contacts.filter(c => {
          const searchLower = searchQuery.toLowerCase();
          
          // 1. Check basic profile text
          const matchName = `${c.firstName} ${c.lastName}`.toLowerCase().includes(searchLower);
          const matchTagFilter = c.tag && c.tag.toLowerCase().includes(searchLower);
          
          // 2. Deep search through interaction notes and specific dates
          const matchInteractions = c.interactions && c.interactions.some(i => {
            // Check note text
            if (i.note && i.note.toLowerCase().includes(searchLower)) return true;
            
            // Check various date formats (e.g. "10/24", "Oct 24", "2024-10-24")
            const d = new Date(i.date);
            if (isNaN(d.getTime())) return false; // Safety check
            
            const dateStr1 = d.toLocaleDateString().toLowerCase(); // e.g. 10/24/2024
            const dateStr2 = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }).toLowerCase(); // e.g. oct 24, 2024
            const dateStr3 = d.toLocaleDateString(undefined, { month: 'long', day: 'numeric' }).toLowerCase(); // e.g. october 24
            const dateStr4 = i.date.split('T')[0]; // e.g. 2024-10-24
            
            return dateStr1.includes(searchLower) || dateStr2.includes(searchLower) || dateStr3.includes(searchLower) || dateStr4.includes(searchLower);
          });
            
          const matchSearch = matchName || matchTagFilter || matchInteractions;
          const matchTagBtn = filterTag === 'All' || c.tag === filterTag;
          
          return matchSearch && matchTagBtn;
        });

        return filtered.sort((a, b) => {
          if (sortOrder === 'alphabetical') return a.firstName.localeCompare(b.firstName);
          
          const dateA = getLatestInteraction(a)?.date || 0;
          const dateB = getLatestInteraction(b)?.date || 0;
          
          if (sortOrder === 'recent') return new Date(dateB) - new Date(dateA);
          return new Date(dateA) - new Date(dateB);
        });
      }, [contacts, searchQuery, filterTag, sortOrder]);

      const handleAddContact = (e) => {
        e.preventDefault();
        if (!newFirstName.trim()) return;

        setContacts([...contacts, {
          id: crypto.randomUUID(),
          firstName: newFirstName.trim(),
          lastName: newLastName.trim(),
          tag: newTag || (tags.length > 0 ? tags[0] : ''),
          targetFrequency: Number(newTargetFreq),
          birthday: newBirthday,
          interactions: [{ id: crypto.randomUUID(), date: new Date().toISOString(), note: 'Added to connections' }]
        }]);
        
        setNewFirstName(''); setNewLastName(''); setNewTargetFreq(30); setNewBirthday(''); setIsAddModalOpen(false);
      };

      const handleSaveEditContact = (e) => {
        e.preventDefault();
        if (!editingContactDetails.firstName.trim()) return;

        setContacts(contacts.map(c => c.id === editingContactDetails.id ? { ...c, ...editingContactDetails, targetFrequency: Number(editingContactDetails.targetFrequency) } : c));
        setEditingContactDetails(null);
      };

      const openEditContactModal = (contact) => {
        setEditingContactDetails({ ...contact });
      };

      const handleLogInteraction = (e) => {
        e.preventDefault();
        if (!loggingInteractionFor || !interactionDate) return;
        
        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === loggingInteractionFor.id ? { 
          ...c, 
          interactions: [...c.interactions, { id: crypto.randomUUID(), date: newDate.toISOString(), note: interactionNote.trim() }] 
        } : c));
        
        setLoggingInteractionFor(null);
      };

      const handleMultiLogSubmit = (e) => {
        e.preventDefault();
        if (multiLogSelectedIds.length === 0 || !interactionDate) return;

        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => {
          if (multiLogSelectedIds.includes(c.id)) {
            return {
              ...c,
              interactions: [...c.interactions, { id: crypto.randomUUID(), date: newDate.toISOString(), note: interactionNote.trim() }]
            };
          }
          return c;
        }));

        setIsMultiLogModalOpen(false);
      };

      const openMultiLogModal = () => {
        setMultiLogSelectedIds([]);
        setMultiLogSearch('');
        const d = new Date();
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote('');
        setIsMultiLogModalOpen(true);
      }

      const handleSaveEditInteraction = (e) => {
        e.preventDefault();
        if (!editingInteraction || !interactionDate) return;

        const [year, month, day] = interactionDate.split('-');
        const newDate = new Date(year, month - 1, day);

        setContacts(contacts.map(c => c.id === editingInteraction.contactId ? {
          ...c,
          interactions: c.interactions.map(i => i.id === editingInteraction.id ? { ...i, date: newDate.toISOString(), note: interactionNote.trim() } : i)
        } : c));

        setEditingInteraction(null);
        setViewingHistoryFor(contacts.find(c => c.id === editingInteraction.contactId));
      };

      const handleDeleteInteraction = (contactId, interactionId) => {
        if(confirm("Are you sure you want to delete this interaction?")) {
           const updatedContacts = contacts.map(c => c.id === contactId ? {
             ...c,
             interactions: c.interactions.filter(i => i.id !== interactionId)
           } : c);
           setContacts(updatedContacts);
           setViewingHistoryFor(updatedContacts.find(c => c.id === contactId));
        }
      };

      const openLogModal = (contact) => {
        setLoggingInteractionFor(contact);
        const d = new Date();
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote('');
      };

      const openEditInteractionModal = (contact, interaction) => {
        setEditingInteraction({ contactId: contact.id, id: interaction.id });
        const d = new Date(interaction.date);
        setInteractionDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        setInteractionNote(interaction.note || '');
      };

      const handleDeleteContact = () => {
        if (contactToDelete) {
          setContacts(contacts.filter(c => c.id !== contactToDelete.id));
          setContactToDelete(null);
        }
      };

      const handleAddTag = (e) => {
        e.preventDefault();
        if (newTagInput.trim() && !tags.includes(newTagInput.trim())) {
          setTags([...tags, newTagInput.trim()]);
          setNewTagInput('');
        }
      };

      const handleDeleteTag = (tagToDelete) => {
        setTags(tags.filter(t => t !== tagToDelete));
        setContacts(contacts.map(c => c.tag === tagToDelete ? { ...c, tag: '' } : c));
        if (filterTag === tagToDelete) setFilterTag('All');
      };

      const handleExportData = () => {
        const dataStr = JSON.stringify(contacts, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `personal-crm-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (Array.isArray(importedData)) setContacts(importedData);
          } catch (error) { console.error('Failed to parse backup'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      if (dataLoading) {
        return <div className="min-h-[100dvh] bg-[#FAFAFA] flex items-center justify-center font-sans text-zinc-500">Loading your CRM...</div>;
      }

      return (
        <div className={`min-h-[100dvh] font-sans p-4 sm:p-10 safe-pb transition-colors duration-200 ${t('bg-[#FAFAFA] text-zinc-800', 'bg-zinc-950 text-zinc-100')}`}>
          <div className="max-w-3xl mx-auto">
            
            <header className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 sm:mb-10">
              <div>
                <div className="flex items-center gap-3">
                  <h1 className={`text-3xl font-light tracking-tight ${t('text-zinc-900', 'text-white')}`}>Connections</h1>
                  <div className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-md text-xs font-medium transition-colors ${
                    syncStatus === 'Syncing...' 
                      ? t('bg-blue-50 text-blue-600', 'bg-blue-500/10 text-blue-400')
                      : syncStatus === 'Sync Error'
                        ? t('bg-rose-50 text-rose-600', 'bg-rose-500/10 text-rose-400')
                        : t('bg-emerald-50 text-emerald-600', 'bg-emerald-500/10 text-emerald-400')
                  }`}>
                    <Cloud size={14} className={syncStatus === 'Syncing...' ? 'animate-pulse' : ''} />
                    <span>{syncStatus}</span>
                  </div>
                </div>
                <p className={`mt-1 text-sm ${t('text-zinc-500', 'text-zinc-400')}`}>Stay mindful of your relationships.</p>
              </div>
              <div className="flex flex-wrap items-center gap-2 sm:gap-3">
                <input type="file" accept=".json" ref={fileInputRef} style={{ display: 'none' }} onChange={handleImportData} />
                
                <div className={`flex rounded-full border overflow-hidden shadow-sm transition-colors ${t('bg-white border-zinc-200', 'bg-zinc-900 border-zinc-800')}`}>
                  <button onClick={() => fileInputRef.current?.click()} className={`p-2.5 transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800')}`} title="Import Backup"><Upload size={16} /></button>
                  <div className={`w-px transition-colors ${t('bg-zinc-200', 'bg-zinc-800')}`}></div>
                  <button onClick={handleExportData} className={`p-2.5 transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800')}`} title="Export Backup"><Download size={16} /></button>
                </div>
                
                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2.5 rounded-full transition-colors border shadow-sm ${t('bg-white text-zinc-600 hover:bg-zinc-100 border-zinc-200', 'bg-zinc-900 text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 border-zinc-800')}`} title="Toggle theme">
                  {isDarkMode ? <Sun size={16} /> : <Moon size={16} />}
                </button>
                
                <button onClick={() => setIsAddModalOpen(true)} className={`inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-full text-sm font-medium transition-colors shadow-sm border ${t('bg-zinc-900 text-white border-transparent hover:bg-zinc-800', 'bg-zinc-800 text-zinc-100 border-zinc-700 hover:bg-zinc-700')}`}>
                  <UserPlus size={16} /> Add Person
                </button>
              </div>
            </header>

            <div className="flex flex-col sm:flex-row gap-3 mb-6">
              <div className="relative flex-1">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Search className={`h-4 w-4 ${t('text-zinc-400', 'text-zinc-500')}`} />
                </div>
                <input
                  type="text"
                  placeholder="Search names, notes, tags, or dates (e.g. 10/24)..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className={`block w-full pl-10 pr-3 py-2.5 border rounded-2xl leading-5 focus:outline-none focus:ring-2 transition-shadow sm:text-sm shadow-sm ${t('bg-white border-zinc-200 placeholder-zinc-400 focus:ring-zinc-900 focus:border-zinc-900 text-zinc-900', 'bg-zinc-900 border-zinc-800 placeholder-zinc-500 focus:ring-zinc-100 focus:border-zinc-100 text-white')}`}
                />
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <ArrowUpDown size={16} className={t('text-zinc-400', 'text-zinc-500')} />
                <select
                  value={sortOrder}
                  onChange={(e) => setSortOrder(e.target.value)}
                  className={`py-2.5 px-3 border rounded-xl text-sm focus:outline-none focus:ring-2 cursor-pointer transition-colors shadow-sm ${t('bg-white border-zinc-200 focus:ring-zinc-900 text-zinc-700', 'bg-zinc-900 border-zinc-800 focus:ring-zinc-100 text-zinc-300')}`}
                >
                  <option value="oldest">Needs Attention</option>
                  <option value="recent">Recently Contacted</option>
                  <option value="alphabetical">Alphabetical</option>
                </select>
              </div>
            </div>

            <div className="flex flex-wrap items-center gap-2 mb-8">
              <button onClick={() => setFilterTag('All')} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${filterTag === 'All' ? t('bg-zinc-900 text-white', 'bg-zinc-100 text-zinc-900') : t('bg-zinc-100 text-zinc-600 hover:bg-zinc-200', 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700')}`}>All</button>
              {tags.map(tag => (

              ))}
              <button onClick={() => setIsManageTagsOpen(true)} className={`p-1.5 rounded-full transition-colors ${t('text-zinc-400 hover:bg-zinc-200', 'text-zinc-500 hover:bg-zinc-800')}`} title="Manage Groups">
                <Settings size={14} />

            </div>

            <div className="space-y-3">
              {sortedAndFilteredContacts.length === 0 ? (
                <div className={`text-center py-16 px-4 border border-dashed rounded-3xl ${t('border-zinc-200 bg-white', 'border-zinc-800 bg-zinc-900')}`}>

                  <h3 className={`text-sm font-medium ${t('text-zinc-900', 'text-zinc-100')}`}>No connections found</h3>
                </div>

                sortedAndFilteredContacts.map(contact => {
                  const latestInteraction = getLatestInteraction(contact);
                  const fullName = `${contact.firstName} ${contact.lastName}`;

                  let needsAttention = true;
                  if (latestInteraction) {
                    const date = new Date(latestInteraction.date);
                    const now = new Date();
                    date.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
                    const diffDays = Math.round(Math.abs(now - date) / (1000 * 60 * 60 * 24));
                    needsAttention = diffDays > (contact.targetFrequency || 30);
                  }

                  return (
                    <div key={contact.id} className={`group flex items-start justify-between p-4 sm:p-5 rounded-2xl border shadow-sm hover:shadow-md transition-all duration-200 gap-3 sm:gap-4 ${t('bg-white border-zinc-100', 'bg-zinc-900 border-zinc-800/50 hover:border-zinc-700')}`}>
                      <div className="flex items-start gap-3 sm:gap-4 min-w-0">
                        <div className={`h-10 w-10 rounded-full flex items-center justify-center font-medium text-sm shrink-0 ${getAvatarColor(fullName, isDarkMode, needsAttention)}`}>
                          {contact.firstName.charAt(0)}{contact.lastName ? contact.lastName.charAt(0) : ''}
                        </div>
                        
                        <div className="min-w-0 pt-0.5">
                          <h3 className={`text-base font-medium flex items-center gap-2 truncate ${t('text-zinc-900', 'text-zinc-100')}`}>
                            {fullName}
                          </h3>
                          <div className="flex flex-wrap items-center gap-1.5 sm:gap-2 mt-1">
                            <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium whitespace-nowrap ${getStatusColor(contact)}`}>
                              {getRelativeTime(latestInteraction?.date)}
                            </span>
                            {contact.tag && (
                              <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium border whitespace-nowrap ${t('bg-zinc-50 border-zinc-200 text-zinc-500', 'bg-zinc-800/50 border-zinc-700 text-zinc-400')}`}>
                                <Tag size={10} className="mr-1 hidden sm:inline-block" />{contact.tag}
                              </span>
                            )}
                            {isBirthdayUpcoming(contact.birthday) && (
                              <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium border whitespace-nowrap ${t('bg-fuchsia-50 border-fuchsia-200 text-fuchsia-600', 'bg-fuchsia-500/10 border-fuchsia-500/20 text-fuchsia-400')}`} title="Birthday within 7 days!">
                                <Gift size={10} className="mr-1 hidden sm:inline-block" /> Upcoming B-Day
                              </span>
                            )}
                          </div>
                          {latestInteraction?.note && (
                            <p className={`mt-2 text-sm italic truncate sm:whitespace-normal ${t('text-zinc-500', 'text-zinc-400')}`}>
                              "{latestInteraction.note}"
                            </p>
                          )}
                        </div>
                      </div>

                      <div className="flex flex-col items-end gap-2 shrink-0 pl-1">
                        <button onClick={() => openLogModal(contact)} className={`inline-flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-1.5 text-[11px] sm:text-sm font-medium rounded-lg transition-colors border ${t('bg-zinc-50 hover:bg-zinc-100 text-zinc-700 border-zinc-200', 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border-zinc-700')}`} title="Log interaction">
                          <MessageSquarePlus size={14} className={`sm:w-4 sm:h-4 ${t('text-zinc-400', 'text-zinc-500')}`} /> Log
                        </button>
                        
                        <div className="flex items-center gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity mt-1 sm:mt-0">
                          <button onClick={() => openEditContactModal(contact)} className={`p-1.5 sm:p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="Edit Contact">
                            <Pencil size={14} />
                          </button>
                          <button onClick={() => setViewingHistoryFor(contact)} className={`p-1.5 sm:p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="View history">
                            <History size={14} />
                          </button>
                          <button onClick={() => setContactToDelete(contact)} className={`p-1.5 sm:p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-rose-500 hover:bg-rose-50', 'text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10')}`} title="Remove connection">
                            <Trash2 size={14} />
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
          
          {/* Multi-Log Floating Action Button */}
          <button 
            onClick={openMultiLogModal}
            className={`fixed fab-safe z-40 p-4 rounded-full shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-200 ${t('bg-zinc-900 text-white', 'bg-zinc-800 border border-zinc-700 text-white hover:bg-zinc-700')}`}
            title="Log Group Interaction"
          >
            <Plus size={24} />
          </button>

          {/* Add Contact Modal */}
          {isAddModalOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setIsAddModalOpen(false))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-5 ${t('text-zinc-900', 'text-white')}`}>Add New Connection</h2>
                <form onSubmit={handleAddContact} className="space-y-4">
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>First Name</label>
                      <input type="text" required value={newFirstName} onChange={(e) => setNewFirstName(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Last Name</label>
                      <input type="text" value={newLastName} onChange={(e) => setNewLastName(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Group</label>
                      <select value={newTag} onChange={(e) => setNewTag(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`}>
                        <option value="">None</option>
                        {tags.map(tag => <option key={tag} value={tag}>{tag}</option>)}
                      </select>
                    </div>
                    <div className="flex-1">
                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Target Freq. (Days)</label>
                      <input type="number" min="1" required value={newTargetFreq} onChange={(e) => setNewTargetFreq(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                    </div>
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Birthday <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <input type="date" value={newBirthday} onChange={(e) => setNewBirthday(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm transition-colors ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setIsAddModalOpen(false)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" disabled={!newFirstName.trim()} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Edit Contact Modal */}
          {editingContactDetails && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setEditingContactDetails(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>

                    </div>

                      <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Last Name</label>

                    </div>

              <div className={`rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-5 ${t('text-zinc-900', 'text-white')}`}>Manage Groups</h2>
                <div className="space-y-3 mb-6 max-h-60 overflow-y-auto">
                  {tags.map(tag => (
                    <div key={tag} className={`flex items-center justify-between p-3 rounded-xl border ${t('bg-zinc-50 border-zinc-200', 'bg-zinc-800/50 border-zinc-700')}`}>
                      <span className={`text-sm font-medium ${t('text-zinc-700', 'text-zinc-300')}`}>{tag}</span>
                      <button onClick={() => handleDeleteTag(tag)} className="p-1 text-zinc-400 hover:text-rose-500 rounded-md transition-colors"><Trash2 size={16} /></button>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleAddTag} className="flex gap-2">
                  <input type="text" placeholder="New group name..." value={newTagInput} onChange={(e) => setNewTagInput(e.target.value)} className={`flex-1 px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white focus:ring-zinc-900', 'border-zinc-700 bg-zinc-800/50 focus:ring-zinc-400 text-white')}`} />
                  <button type="submit" disabled={!newTagInput.trim()} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('bg-zinc-900 text-white', 'bg-white text-zinc-900 disabled:opacity-50')}`}>Add</button>
                </form>
                <div className="mt-6 flex justify-end">
                  <button onClick={() => setIsManageTagsOpen(false)} className={`px-4 py-2 text-sm font-medium rounded-xl ${t('bg-zinc-100 hover:bg-zinc-200', 'bg-zinc-800 hover:bg-zinc-700 text-white')}`}>Done</button>
                </div>
              </div>
            </div>
          )}
          
          {/* Multi-Log Group Interaction Modal */}
          {isMultiLogModalOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setIsMultiLogModalOpen(false))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')} flex flex-col max-h-[90vh]`}>
                <h2 className={`text-xl font-medium mb-1 ${t('text-zinc-900', 'text-white')}`}>Log Group Interaction</h2>
                <p className={`text-sm mb-5 ${t('text-zinc-500', 'text-zinc-400')}`}>Select multiple people to log the same note.</p>
                
                <form onSubmit={handleMultiLogSubmit} className="space-y-4 flex-1 flex flex-col overflow-hidden">
                  <div className="flex flex-col flex-1 min-h-[150px] max-h-[200px]">
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Who was there?</label>
                    <input type="text" placeholder="Search contacts..." value={multiLogSearch} onChange={e => setMultiLogSearch(e.target.value)} className={`mb-2 block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                    <div className={`flex-1 overflow-y-auto border rounded-xl p-2 ${t('border-zinc-200 bg-zinc-50', 'border-zinc-700 bg-zinc-800/30')}`}>
                      {contacts.filter(c => `${c.firstName} ${c.lastName}`.toLowerCase().includes(multiLogSearch.toLowerCase())).map(c => (
                        <div 
                          key={c.id} 
                          onClick={() => {
                            if (multiLogSelectedIds.includes(c.id)) {
                              setMultiLogSelectedIds(multiLogSelectedIds.filter(id => id !== c.id));
                            } else {
                              setMultiLogSelectedIds([...multiLogSelectedIds, c.id]);
                            }
                          }}
                          className={`flex items-center gap-3 p-2 rounded-lg cursor-pointer transition-colors ${t('hover:bg-zinc-100', 'hover:bg-zinc-800/80')}`}
                        >
                          <div className={`w-5 h-5 rounded border flex items-center justify-center flex-shrink-0 ${multiLogSelectedIds.includes(c.id) ? t('bg-zinc-900 border-zinc-900', 'bg-white border-white') : t('bg-white border-zinc-300', 'bg-zinc-900 border-zinc-600')}`}>
                            {multiLogSelectedIds.includes(c.id) && <Check size={12} className={t('text-white', 'text-zinc-900')} />}
                          </div>
                          <span className={`text-sm select-none ${t('text-zinc-800', 'text-zinc-200')}`}>{c.firstName} {c.lastName}</span>
                        </div>
                      ))}
                    </div>
                    <div className={`text-xs mt-1.5 font-medium ${t('text-zinc-500', 'text-zinc-400')}`}>
                      {multiLogSelectedIds.length} person(s) selected
                    </div>
                  </div>
                  
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="2" placeholder="What did you talk about?" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm resize-none ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                  </div>
                  <div className="mt-4 pt-2 flex justify-end gap-3">
                    <button type="button" onClick={() => setIsMultiLogModalOpen(false)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" disabled={multiLogSelectedIds.length === 0} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200 disabled:opacity-50')}`}>Save Interaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Log Single Interaction Modal */}
          {loggingInteractionFor && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setLoggingInteractionFor(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-1 ${t('text-zinc-900', 'text-white')}`}>Log Interaction</h2>
                <p className={`text-sm mb-5 ${t('text-zinc-500', 'text-zinc-400')}`}>With {loggingInteractionFor.firstName} {loggingInteractionFor.lastName}</p>
                <form onSubmit={handleLogInteraction} className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="3" placeholder="What did you talk about?" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm resize-none ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setLoggingInteractionFor(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save Interaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Delete Confirmation Modal */}
          {contactToDelete && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setContactToDelete(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-3 ${t('text-zinc-900', 'text-white')}`}>Remove Connection?</h2>
                <p className={`text-sm mb-6 ${t('text-zinc-600', 'text-zinc-400')}`}>Are you sure you want to remove {contactToDelete.firstName} from your list? This action cannot be undone.</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setContactToDelete(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                  <button onClick={handleDeleteContact} className="px-4 py-2 text-sm font-medium text-white bg-rose-600 hover:bg-rose-700 rounded-xl transition-colors">Yes, remove</button>
                </div>
              </div>
            </div>
          )}

          {/* View History Modal */}
          {viewingHistoryFor && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setViewingHistoryFor(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')} flex flex-col max-h-[80vh]`}>
                <div className="flex items-center justify-between mb-5">
                  <h2 className={`text-xl font-medium ${t('text-zinc-900', 'text-white')}`}>Interaction History</h2>
                  <button onClick={() => setViewingHistoryFor(null)} className={`p-1.5 rounded-lg transition-colors ${t('text-zinc-400 hover:bg-zinc-100', 'text-zinc-500 hover:bg-zinc-800')}`}><X size={20}/></button>
                </div>
                <p className={`text-sm mb-4 font-medium ${t('text-zinc-700', 'text-zinc-300')}`}>{viewingHistoryFor.firstName} {viewingHistoryFor.lastName}</p>
                
                <div className="overflow-y-auto flex-1 pr-2 space-y-4">
                  {[...viewingHistoryFor.interactions].sort((a,b) => new Date(b.date) - new Date(a.date)).map(interaction => (
                    <div key={interaction.id} className={`group/item p-4 rounded-2xl border relative ${t('bg-zinc-50 border-zinc-200', 'bg-zinc-800/30 border-zinc-700')}`}>
                      <div className="flex justify-between items-start">
                        <span className={`text-xs font-medium px-2 py-1 rounded-md ${t('bg-white text-zinc-600 border border-zinc-200', 'bg-zinc-900 text-zinc-300 border-zinc-700')}`}>
                          {new Date(interaction.date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}
                        </span>
                        <div className="flex items-center gap-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
                          <button onClick={() => openEditInteractionModal(viewingHistoryFor, interaction)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-blue-500 hover:bg-blue-50', 'text-zinc-500 hover:text-blue-400 hover:bg-blue-500/10')}`} title="Edit note">
                            <Pencil size={12} />
                          </button>
                          <button onClick={() => handleDeleteInteraction(viewingHistoryFor.id, interaction.id)} className={`p-1 rounded-md transition-colors ${t('text-zinc-400 hover:text-rose-500 hover:bg-rose-50', 'text-zinc-500 hover:text-rose-400 hover:bg-rose-500/10')}`} title="Delete note">
                            <Trash2 size={12} />
                          </button>
                        </div>
                      </div>
                      {interaction.note && (
                        <p className={`mt-3 text-sm leading-relaxed ${t('text-zinc-700', 'text-zinc-300')}`}>{interaction.note}</p>
                      )}
                    </div>
                  ))}
                  {viewingHistoryFor.interactions.length === 0 && (
                    <p className={`text-center py-6 text-sm ${t('text-zinc-500', 'text-zinc-500')}`}>No interactions recorded yet.</p>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Edit Interaction Modal */}
          {editingInteraction && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={(e) => handleBackdropClick(e, () => setEditingInteraction(null))}>
              <div className={`rounded-3xl p-6 w-full max-w-md shadow-2xl animate-in fade-in zoom-in-95 duration-200 ${t('bg-white', 'bg-zinc-900 border border-zinc-800')}`}>
                <h2 className={`text-xl font-medium mb-5 ${t('text-zinc-900', 'text-white')}`}>Edit Interaction</h2>
                <form onSubmit={handleSaveEditInteraction} className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Date</label>
                    <input type="date" required value={interactionDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => setInteractionDate(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white [color-scheme:dark]')}`} />
                  </div>
                  <div>
                    <label className={`block text-sm font-medium mb-1 ${t('text-zinc-700', 'text-zinc-300')}`}>Note <span className={`font-normal ${t('text-zinc-400', 'text-zinc-500')}`}>(Optional)</span></label>
                    <textarea rows="3" value={interactionNote} onChange={(e) => setInteractionNote(e.target.value)} className={`block w-full px-3 py-2 border rounded-xl focus:ring-2 sm:text-sm resize-none ${t('border-zinc-200 bg-zinc-50 focus:bg-white', 'border-zinc-700 bg-zinc-800/50 text-white')}`} />
                  </div>
                  <div className="mt-8 flex justify-end gap-3">
                    <button type="button" onClick={() => setEditingInteraction(null)} className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-zinc-600 hover:bg-zinc-100', 'text-zinc-400 hover:bg-zinc-800')}`}>Cancel</button>
                    <button type="submit" className={`px-4 py-2 text-sm font-medium rounded-xl transition-colors ${t('text-white bg-zinc-900 hover:bg-zinc-800', 'text-zinc-900 bg-white hover:bg-zinc-200')}`}>Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
